name: oulecu
description: OULECU - Offline Image Card Generator with extensive customization
publish_to: 'none'
version: 2.5.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image: ^4.1.3
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  permission_handler: ^11.0.1
  flutter_colorpicker: ^1.0.3
  image_picker: ^1.0.4

  flutter_svg: ^2.0.9
  vector_math: ^2.1.4
  intl: ^0.20.2
  google_fonts: ^6.1.0
  flutter_launcher_icons: ^0.13.1
  share_plus: ^7.2.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_slidable: ^3.0.1
  provider: ^6.1.1
  path: ^1.8.3
  cupertino_icons: ^1.0.6
  flutter_quill: ^11.5.1
  url_launcher: ^6.3.2
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
    - family: FiraCode
      fonts:
        - asset: assets/fonts/FiraCode.ttf
    - family: SourceCodePro
      fonts:
        - asset: assets/fonts/SourceCodePro.ttf
    - family: Hack
      fonts:
        - asset: assets/fonts/Hack.ttf
    - family: UbuntuMono
      fonts:
        - asset: assets/fonts/UbuntuMono.ttf
    - family: Courier New
      fonts:
        - asset: assets/fonts/CourierNew.ttf
    - family: Inconsolata
      fonts:
        - asset: assets/fonts/Inconsolata.ttf
  assets:
    - assets/images/
    - assets/icons/

    - assets/templates/nature/
    - assets/templates/tech/
    - assets/templates/finance/
    - assets/templates/creative/
    - assets/templates/bible/
    - assets/templates/luxury/
    - assets/templates/academic/
    - assets/templates/other/



flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 26
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo.png"
